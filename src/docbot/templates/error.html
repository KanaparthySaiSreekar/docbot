<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocBot - Error</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 3rem 2.5rem;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        .error-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        h1 {
            color: #e74c3c;
            font-size: 1.8rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .error-message {
            color: #555;
            font-size: 1rem;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .button {
            display: inline-block;
            padding: 0.8rem 1.8rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            margin: 0.5rem;
            transition: all 0.3s ease;
        }

        .button-primary {
            background: #4285f4;
            color: white;
            box-shadow: 0 4px 12px rgba(66, 133, 244, 0.3);
        }

        .button-primary:hover {
            background: #357ae8;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(66, 133, 244, 0.4);
        }

        .button-secondary {
            background: #f8f9fa;
            color: #333;
            border: 1px solid #ddd;
        }

        .button-secondary:hover {
            background: #e9ecef;
            transform: translateY(-2px);
        }

        .button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-icon">⚠️</div>
        <h1>Authentication Failed</h1>
        <p class="error-message">
            {{ error_message | default("An error occurred during authentication. Please try again.") }}
        </p>
        <div>
            <a href="/auth/login" class="button button-primary">Try Again</a>
            <a href="/" class="button button-secondary">Back to Home</a>
        </div>
    </div>
</body>
</html>
